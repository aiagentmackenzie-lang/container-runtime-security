apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "scarlet-runtime.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "scarlet-runtime.fullname" . }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: ["securityscarlet.ai"]
    resources: [scarletrules, scarletpolicies]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "scarlet-runtime.fullname" . }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "scarlet-runtime.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "scarlet-runtime.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}