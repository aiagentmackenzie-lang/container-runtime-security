apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scarlet-runtime.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "scarlet-runtime.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "scarlet-runtime.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "scarlet-runtime.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          env:
            - name: SCARLET_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 9443
              name: grpc-ai
            - containerPort: 8080
              name: api
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scarlet-runtime.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  selector:
    {{- include "scarlet-runtime.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  ports:
    - name: grpc-ai
      port: 9443
      targetPort: 9443
    - name: api
      port: 8080
      targetPort: 8080