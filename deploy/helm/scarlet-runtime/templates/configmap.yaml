apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scarlet-runtime.fullname" . }}-rules
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scarlet-runtime.labels" . | nindent 4 }}
data:
  {{- (.Files.Glob "../../rules/default_rules.yaml").AsConfig | nindent 2 }}
  # If the above doesn't work in your Helm setup, copy the rules file
  # content directly or use --set-file rules.defaultRules=<path>